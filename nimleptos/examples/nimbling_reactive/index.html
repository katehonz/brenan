<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NimLeptos + Nimbling Reactive Counter</title>
  <style>
    body { font-family: sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
    h1 { color: #333; }
    .counter { font-size: 48px; font-weight: bold; color: #4a90d9; margin: 20px 0; }
    .doubled { font-size: 24px; color: #888; margin-bottom: 20px; }
    button { font-size: 18px; padding: 10px 20px; margin: 5px; cursor: pointer; }
    .info { margin-top: 30px; padding: 15px; background: #f5f5f5; border-radius: 8px; }
    .info code { background: #e0e0e0; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🦎 NimLeptos + Nimbling</h1>
  <p>Reactive counter running in WASM via nimbling</p>

  <div class="counter" id="count">0</div>
  <div class="doubled">Doubled: <span id="doubled">0</span></div>

  <button id="inc">+1</button>
  <button id="dec">-1</button>
  <button id="batch">Batch +5 (×2)</button>
  <button id="reset">Reset</button>

  <div class="info">
    <p><strong>Effect runs:</strong> <span id="effects">0</span></p>
    <p>Signals and effects run inside WASM. JS only calls exported functions and updates DOM.</p>
  </div>

  <!-- Load the nimbling-generated JS glue -->
  <script type="module">
    import initWasm from './pkg/counter.js';

    async function main() {
      const wasm = await initWasm();

      // Initialize reactive state
      wasm.initCounter(0);

      // DOM elements
      const countEl = document.getElementById('count');
      const doubledEl = document.getElementById('doubled');
      const effectsEl = document.getElementById('effects');

      // Update DOM from WASM state
      function updateDisplay() {
        countEl.textContent = wasm.getCount();
        doubledEl.textContent = wasm.getDoubled();
        effectsEl.textContent = wasm.getEffectRuns();
      }

      // Register change callback (effect from WASM calls this)
      wasm.registerOnChange(() => {
        updateDisplay();
      });

      // Initial render
      updateDisplay();

      // Event handlers
      document.getElementById('inc').addEventListener('click', () => {
        wasm.increment();
        updateDisplay();
      });

      document.getElementById('dec').addEventListener('click', () => {
        wasm.decrement();
        updateDisplay();
      });

      document.getElementById('batch').addEventListener('click', () => {
        wasm.batchUpdate(5);
        updateDisplay();
      });

      document.getElementById('reset').addEventListener('click', () => {
        wasm.reset(0);
        updateDisplay();
      });
    }

    main().catch(console.error);
  </script>
</body>
</html>
