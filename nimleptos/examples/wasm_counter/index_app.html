<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NimLeptos WASM Counter</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 500px; margin: 50px auto; padding: 0 20px; background: #1a1a2e; color: #eee; }
  .title { color: #f0c040; }
  h1 { margin-bottom: 0; }
  #app { background: #16213e; border-radius: 12px; padding: 30px; margin-top: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .count-display { font-size: 4em; font-weight: bold; margin: 10px 0; transition: color 0.3s; }
  .count-display.hot { color: #ff6b6b; }
  .doubled-display { font-size: 1.2em; color: #aaa; margin-bottom: 20px; }
  .buttons { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
  button { font-size: 1.5em; width: 60px; height: 60px; border: none; border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
  button:active { transform: scale(0.95); }
  .btn-dec { background: #e74c3c; color: white; }
  .btn-inc { background: #2ecc71; color: white; }
  .status { text-align: center; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
  .status.loading { background: #f39c12; color: #000; }
  .status.ready { background: #27ae60; }
</style>
</head>
<body>

<h1 class="title">⚡ NimLeptos WASM Counter</h1>

<div class="status loading" id="status">Loading...</div>

<div id="app">
  <div class="count-display" id="count-display">Count: 0</div>
  <div class="doubled-display" id="doubled-display">Doubled: 0</div>
  <div class="buttons">
    <button class="btn-dec" id="btn-dec">-</button>
    <button class="btn-inc" id="btn-inc">+</button>
  </div>
</div>

<script src="wasm_app.js"></script>
<script>
NimLeptosWasm().then(function(Module) {
  var s = document.getElementById('status');
  s.textContent = 'WASM loaded. Initializing...';

  Module.ccall('render', null, [], []);

  setTimeout(function() {
    document.getElementById('btn-inc').onclick = function() { Module.ccall('increment', null, [], []); };
    document.getElementById('btn-dec').onclick = function() { Module.ccall('decrement', null, [], []); };
    s.textContent = 'Nim signals + WASM reactive effects active';
    s.className = 'status ready';
  }, 50);
});
</script>

</body>
</html>
