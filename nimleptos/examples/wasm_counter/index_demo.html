<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NimLeptos WASM — Full Demo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 500px; margin: 50px auto; padding: 0 20px; background: #0f0f23; color: #ccc; }
  .title { color: #f0c040; margin-bottom: 0; }
  .subtitle { color: #666; font-size: 0.9em; margin-top: 0; }
  #app { margin-top: 20px; }
  .app { background: #1a1a3e; border-radius: 16px; padding: 30px; box-shadow: 0 4px 30px rgba(0,0,0,0.4); }
  .counter-area { text-align: center; margin: 20px 0; }
  .count { font-size: 5em; font-weight: 900; background: linear-gradient(135deg, #f0c040, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .label { color: #888; font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; }
  .memo-info { text-align: center; margin: 15px 0; padding: 10px; background: #0f0f23; border-radius: 8px; }
  .hot-badge { color: #ff6b6b; font-weight: bold; }
  .cool-badge { color: #2ecc71; font-weight: bold; }
  .buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
  button { border: none; border-radius: 10px; cursor: pointer; font-size: 1.3em; padding: 12px 28px; transition: transform 0.1s, filter 0.2s; }
  button:active { transform: scale(0.95); }
  .btn-dec { background: #e74c3c; color: white; }
  .btn-inc { background: #2ecc71; color: white; }
  .btn-reset { background: #555; color: white; }
  button:hover { filter: brightness(1.2); }
  .status { text-align: center; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
  .status.loading { background: #f39c12; color: #000; }
  .status.ready { background: #27ae60; }
</style>
</head>
<body>

<h1 class="title">⚡ NimLeptos × WASM</h1>
<p class="subtitle">Reactive signals, memos & if/else — all in WebAssembly</p>

<div class="status loading" id="status">Loading WASM...</div>
<div id="app"></div>

<script>
// Element registry for WASM→DOM bridge
var __nbgNextHandle = 0;
var __nbgEls = {};
</script>
<script src="wasm_demo.js"></script>
<script>
WasmDemo().then(function(Module) {
  var s = document.getElementById('status');
  s.textContent = 'Mounting...';

  Module.ccall('mount', null, [], []);

  setTimeout(function() {
    document.getElementById('btn-inc').onclick = function() { Module.ccall('increment', null, [], []); };
    document.getElementById('btn-dec').onclick = function() { Module.ccall('decrement', null, [], []); };
    document.getElementById('btn-reset').onclick = function() { Module.ccall('reset', null, [], []); };
    s.textContent = 'Reactive system active. Nim signals + WASM.';
    s.className = 'status ready';
  }, 50);
});
</script>

</body>
</html>
