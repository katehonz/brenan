<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NimLeptos WASM Counter</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 50px auto; padding: 0 20px; background: #1a1a2e; color: #eee; }
  .title { color: #f0c040; font-size: 1.4em; }
  h1 { margin-bottom: 0; }
  #app { background: #16213e; border-radius: 12px; padding: 30px; margin-top: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .count-display { font-size: 3em; font-weight: bold; text-align: center; margin: 20px 0; transition: color 0.3s; }
  .count-display.hot { color: #ff6b6b; }
  .doubled-display { font-size: 1.2em; text-align: center; color: #aaa; margin-bottom: 20px; }
  .buttons { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
  button { font-size: 1.8em; width: 70px; height: 70px; border: none; border-radius: 50%; cursor: pointer; transition: transform 0.1s, background 0.2s; }
  button:active { transform: scale(0.95); }
  #btn-dec { background: #e74c3c; color: white; }
  #btn-inc { background: #2ecc71; color: white; }
  #btn-dec:hover { background: #c0392b; }
  #btn-inc:hover { background: #27ae60; }
  .info { text-align: center; color: #666; margin-top: 30px; font-size: 0.85em; }
  .status { text-align: center; margin-top: 10px; padding: 10px; border-radius: 6px; }
  .status.loading { background: #f39c12; color: #000; }
  .status.ready { background: #27ae60; }
</style>
</head>
<body>

<h1><span class="title">⚡ NimLeptos</span> + WASM</h1>
<p>Reactive counter with Nim signals running in WebAssembly</p>

<div id="app">
  <div class="count-display" id="count-display">Count: 0</div>
  <div class="doubled-display" id="doubled-display">Doubled: 0</div>
  <div class="buttons">
    <button id="btn-dec">-</button>
    <button id="btn-inc">+</button>
  </div>
  <div class="status loading" id="status">Loading WASM module...</div>
  <div class="info" id="info"></div>
</div>

<script src="wasm_counter.js"></script>
<script>
// The wasm_counter.js exports NimLeptosWasm (modularized)
NimLeptosWasm().then(function(Module) {
  var statusEl = document.getElementById('status');
  statusEl.textContent = 'WASM module loaded. Reactive system active.';
  statusEl.className = 'status ready';

  // Wire up event handlers
  document.getElementById('btn-inc').onclick = function() {
    Module.ccall('increment', null, [], []);
  };
  document.getElementById('btn-dec').onclick = function() {
    Module.ccall('decrement', null, [], []);
  };

  // Initialize reactive rendering
  Module.ccall('render', null, [], []);

  // Show initial count
  var count = Module.ccall('getCount', 'number', [], []);
  document.getElementById('info').textContent = 'Initial count: ' + count;
});
</script>

</body>
</html>
