<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NimLeptos Counter (Client-Side)</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    #app {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .counter-title {
      margin-top: 0;
      color: #333;
    }
    .counter-display, .counter-doubled {
      font-size: 1.2rem;
      color: #555;
      margin: 10px 0;
    }
    .btn {
      font-size: 1.2rem;
      padding: 10px 20px;
      margin: 10px 10px 0 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a90d9;
      color: white;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #357abd;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="counter_client.js"></script>
</body>
</html>
