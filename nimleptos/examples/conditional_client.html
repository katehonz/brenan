<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NimLeptos Conditional Rendering</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      background: #f0f2f5;
    }
    #app {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
      color: #333;
    }
    .greeting {
      font-size: 1.3rem;
      color: #667eea;
      margin: 16px 0;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .btn {
      flex: 1;
      font-size: 1rem;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #667eea;
      color: white;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #5a6fd6;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="conditional_client.js"></script>
</body>
</html>
